name: nightly-security

on:
  schedule:
    - cron: "0 2 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit osv-scanner || true
      - run: pip-audit || true
