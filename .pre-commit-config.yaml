repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic]
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest-unit
        entry: bash -lc '.venv/bin/python -m pytest -q tests/unit -x || python3 -m pytest -q tests/unit -x'
        language: system
        pass_filenames: false
