services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genai-taskq-api
    command: uvicorn genai_taskq.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "${GTQ_API_PORT:-18000}:8000"
    volumes:
      - gtq_data:/data
    environment:
      - GTQ_DATABASE_URL=sqlite:////data/genai_taskq.db
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genai-taskq-worker
    command: gtq-worker
    volumes:
      - gtq_data:/data
    environment:
      - GTQ_DATABASE_URL=sqlite:////data/genai_taskq.db
    restart: unless-stopped
    depends_on:
      - api

volumes:
  gtq_data:
